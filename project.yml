name: Haunt
options:
  bundleIdPrefix: com.rci.haunt
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: YKQA4JQPGQ
    CODE_SIGN_STYLE: Automatic
targets:
  Haunt:
    type: application
    platform: iOS
    sources:
      - Haunt
    info:
      path: Haunt/Info.plist
      properties:
        UILaunchScreen: {}
        UISupportedInterfaceOrientations: [UIInterfaceOrientationPortrait]
        NSPhotoLibraryUsageDescription: "Haunt needs your photos to reveal the spirits hiding inside them."
        NSCameraUsageDescription: "Haunt uses your camera to scan rooms for spirits."
        UIAppFonts:
          - PicNic-Regular.otf
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.rci.haunt
